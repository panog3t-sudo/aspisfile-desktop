name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches tauri.conf.json version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG#v}"
          CONF_VERSION=$(grep -E '^\s*"version"' src-tauri/tauri.conf.json | head -1 | sed -E 's/.*"version":\s*"([^"]+)".*/\1/')
          PKG_VERSION=$(grep -E '^\s*"version"' package.json | head -1 | sed -E 's/.*"version":\s*"([^"]+)".*/\1/')
          echo "Tag version:    $TAG_VERSION"
          echo "tauri.conf:     $CONF_VERSION"
          echo "package.json:   $PKG_VERSION"
          if [ "$TAG_VERSION" != "$CONF_VERSION" ] || [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo ""
            echo "❌ Version mismatch — bump tauri.conf.json and package.json to $TAG_VERSION before tagging."
            echo "macOS Get Info / About reads CFBundleShortVersionString from tauri.conf.json, so the OS would lie about the installed version."
            exit 1
          fi
          echo "✅ Versions aligned"

  build-macos:
    needs: verify-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      # Tauri handles keychain creation, cert import, signing, and notarisation
      # when these env vars are present. No manual `security` steps needed —
      # they were the source of the "item could not be found in the keychain"
      # error on the previous attempt (temp keychain wasn't added to the
      # search list, so codesign couldn't see the imported identity).
      # Build + sign + notarise the .app only. We skip Tauri's own .dmg
      # bundler (--bundles app) because it doesn't write a .DS_Store, so
      # Finder ignores the background.png and shows the default
      # auto-arranged layout. We build a properly-laid-out .dmg with
      # dmgbuild below.
      - name: Build, sign, notarise universal macOS app
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri build -- --target universal-apple-darwin --bundles app

      - name: Setup Python (dmgbuild)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dmgbuild
        run: pip install --upgrade pip dmgbuild

      # Generate a proper Finder alias to /Applications via osascript.
      # Replaces dmgbuild's default Unix symlink (which Finder renders as
      # a dashed empty placeholder with no drop animation). The proper
      # alias shows the real Applications folder icon and gives standard
      # drag-and-drop feedback when the user installs the app.
      #
      # continue-on-error: if osascript can't talk to Finder on this
      # runner, dmg-settings.py falls back to the symlink path — no
      # regression vs. previous behaviour.
      - name: Generate Applications alias (via Finder)
        id: appsalias
        continue-on-error: true
        run: |
          STAGE="$RUNNER_TEMP/dmg-apps-alias"
          rm -rf "$STAGE" && mkdir -p "$STAGE"
          osascript -e "tell application \"Finder\" to make alias file to POSIX file \"/Applications\" at POSIX file \"$STAGE\""
          # Finder names the file "Applications" or "Applications alias"
          # depending on macOS version. Normalise to exactly "Applications"
          # so the icon_locations entry in dmg-settings.py matches.
          ALIAS_RAW=$(find "$STAGE" -maxdepth 1 -not -path "$STAGE" | head -1)
          if [ -z "$ALIAS_RAW" ]; then
            echo "osascript ran but produced no alias file"
            exit 1
          fi
          if [ "$ALIAS_RAW" != "$STAGE/Applications" ]; then
            mv "$ALIAS_RAW" "$STAGE/Applications"
          fi
          ls -la "$STAGE/"
          echo "alias_path=$STAGE/Applications" >> "$GITHUB_OUTPUT"

      # dmgbuild generates a .DS_Store programmatically. No AppleScript / GUI
      # dependency, so this works in headless CI where Tauri's create-dmg
      # path could not.
      - name: Build DMG with proper Finder layout
        run: |
          APP_PATH=$(ls -d src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app | head -1)
          echo "App: $APP_PATH"
          ALIAS_DEFINE=()
          if [ -n "${{ steps.appsalias.outputs.alias_path }}" ]; then
            ALIAS_DEFINE+=(-D "apps_alias=${{ steps.appsalias.outputs.alias_path }}")
            echo "Using Finder alias for Applications: ${{ steps.appsalias.outputs.alias_path }}"
          else
            echo "Falling back to Unix symlink for Applications (osascript step did not produce an alias)"
          fi
          mkdir -p artifacts
          dmgbuild -s src-tauri/dmg-settings.py \
                   -D app="$APP_PATH" \
                   "${ALIAS_DEFINE[@]}" \
                   "AspisFile Viewer" artifacts/AspisFile.dmg
          ls -la artifacts/

      # Tauri's build step set up a temporary keychain via APPLE_CERTIFICATE,
      # used it for app signing + notarisation, then tore it down. To sign
      # the .dmg container ourselves we need to import the cert into a
      # fresh persistent keychain that codesign can read.
      - name: Import cert for DMG signing
        if: ${{ env.APPLE_CERT_PRESENT == 'true' }}
        env:
          APPLE_CERT_PRESENT:         ${{ secrets.APPLE_CERTIFICATE != '' }}
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          KEYCHAIN="$RUNNER_TEMP/dmg-signing.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
                  -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain
          rm /tmp/cert.p12

      # Sign the .dmg container. The .app inside is already signed +
      # notarised by Tauri; this just signs the container so Safari shows
      # "verified developer" on download instead of an unidentified-source
      # warning.
      - name: Sign the DMG container
        if: ${{ env.APPLE_CERT_PRESENT == 'true' }}
        env:
          APPLE_CERT_PRESENT:     ${{ secrets.APPLE_CERTIFICATE != '' }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --sign "$APPLE_SIGNING_IDENTITY" --timestamp artifacts/AspisFile.dmg
          codesign --verify --verbose artifacts/AspisFile.dmg

      # Notarise the .dmg so Gatekeeper on the user's Mac can validate it
      # offline. Tauri already notarised the .app inside; we now also
      # notarise the .dmg container itself.
      - name: Notarise the DMG container
        if: ${{ env.APPLE_ID_PRESENT == 'true' }}
        env:
          APPLE_ID_PRESENT: ${{ secrets.APPLE_ID != '' }}
          APPLE_ID:       ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:  ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit artifacts/AspisFile.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple artifacts/AspisFile.dmg

      # Internet-Enable used to be the path to "Safari auto-mounts on
      # download." Apple removed the hdiutil verb in modern macOS for
      # security reasons. Removed from the workflow. Future v1.2.0
      # switches to .pkg installer which auto-opens via Installer.app
      # on download — covered in project roadmap.

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/AspisFile.dmg
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        # Unsigned for now — SmartScreen warning appears on first run.
        # Windows code-signing cert will be wired in once provisioned.
        run: npm run tauri build

      - name: Rename msi to stable name
        shell: pwsh
        run: |
          $src = Get-ChildItem -Path src-tauri\target\release\bundle\msi\*.msi | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item $src.FullName -Destination artifacts\AspisFile.msi
          Get-ChildItem artifacts

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: artifacts/AspisFile.msi
          retention-days: 1

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: AspisFile ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## AspisFile Desktop ${{ github.event.inputs.tag || github.ref_name }}

            ### Download
            - **macOS** — `AspisFile.dmg` (universal: Apple Silicon + Intel)
            - **Windows** — `AspisFile.msi`

            ### Requirements
            - macOS 12 or later
            - Windows 10 or later

            ### Installation
            **macOS**: Double-click the .dmg and drag AspisFile to Applications. If a security warning appears, right-click the app and choose Open.
            **Windows**: Run the .msi installer. If SmartScreen appears, click "More info → Run anyway".
          files: |
            artifacts/macos/AspisFile.dmg
            artifacts/windows/AspisFile.msi
          draft: false
          prerelease: false
