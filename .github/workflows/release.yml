name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches tauri.conf.json version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG#v}"
          CONF_VERSION=$(grep -E '^\s*"version"' src-tauri/tauri.conf.json | head -1 | sed -E 's/.*"version":\s*"([^"]+)".*/\1/')
          PKG_VERSION=$(grep -E '^\s*"version"' package.json | head -1 | sed -E 's/.*"version":\s*"([^"]+)".*/\1/')
          echo "Tag version:    $TAG_VERSION"
          echo "tauri.conf:     $CONF_VERSION"
          echo "package.json:   $PKG_VERSION"
          if [ "$TAG_VERSION" != "$CONF_VERSION" ] || [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo ""
            echo "❌ Version mismatch — bump tauri.conf.json and package.json to $TAG_VERSION before tagging."
            echo "macOS Get Info / About reads CFBundleShortVersionString from tauri.conf.json, so the OS would lie about the installed version."
            exit 1
          fi
          echo "✅ Versions aligned"

  build-macos:
    needs: verify-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust (universal targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install dependencies
        run: npm ci

      # Tauri builds, signs (Developer ID Application cert), and would
      # also notarise if APPLE_ID/PASSWORD/TEAM_ID env vars were set.
      #
      # We deliberately OMIT those vars here so Tauri signs but doesn't
      # notarise — the next step re-signs the .app with the embedded
      # provisioning profile + entitlements, which invalidates any
      # notarisation ticket Tauri would have stapled. Notarisation
      # happens after the re-sign in the "Notarise + staple .app" step
      # below.
      #
      # --bundles app skips Tauri's own .dmg bundler — the macOS
      # installer is built as a .pkg below (signed with the separate
      # Developer ID Installer cert).
      - name: Build + sign universal macOS app (no notarise yet)
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri build -- --target universal-apple-darwin --bundles app

      # Re-import the Developer ID Application cert into a fresh
      # keychain. Tauri's build step creates its own temp keychain,
      # uses it for the initial signing, then tears it down — so when
      # our re-sign step below tries to use the Application cert again,
      # `security find-identity` / codesign can't find it ("The
      # specified item could not be found in the keychain"). Same
      # pattern as the existing Installer-cert keychain dance further
      # down for pkgbuild.
      - name: Re-import Application cert for re-sign
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/app-cert.p12
          KEYCHAIN="$RUNNER_TEMP/app-resign.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import /tmp/app-cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
                  -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain
          rm /tmp/app-cert.p12
          # Sanity-check the identity is reachable.
          security find-identity -v -p codesigning "$KEYCHAIN"

      # Embed the Developer ID Provisioning Profile + re-sign with our
      # entitlements file. Required because com.apple.developer.
      # associated-domains needs a matching embedded.provisionprofile
      # for Developer ID distribution — without it, macOS launchd
      # refuses the spawn with POSIX 163 (EAUTH). See the v1.7.3
      # incident notes.
      #
      # Order matters: codesign deepest-first (Tauri's build already
      # signed nested helpers, but our --force re-sign on the .app
      # invalidates inner signatures unless we re-sign them too).
      - name: Embed provisioning profile + re-sign with entitlements
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH=$(ls -d src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app | head -1)
          echo "App: $APP_PATH"

          # 1. Drop the profile into Contents/embedded.provisionprofile.
          # macOS launchd reads this at spawn time to verify the
          # entitlements claimed by the binary are authorised.
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > "$APP_PATH/Contents/embedded.provisionprofile"
          ls -la "$APP_PATH/Contents/embedded.provisionprofile"

          # 1b. Patch Info.plist to add UTExportedTypeDeclarations for
          # the .afs UTI. Tauri 2's fileAssociations config only emits
          # CFBundleTypeExtensions which registers us as a HANDLER but
          # not the OWNER of the type. Without a UTI declaration, macOS
          # launches the app via Apple Events but does NOT fire
          # applicationOpenURLs: — so RunEvent::Opened never delivers
          # the path. Diagnosed via v1.7.17 HUD overlay: file double-click
          # ran setup() + Ready but never RunEvent::Opened.
          PLIST="$APP_PATH/Contents/Info.plist"
          echo "--- patching $PLIST to add UTExportedTypeDeclarations ---"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0 dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeIdentifier string com.aspisfile.viewer.document" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeDescription string AspisFile Document" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeConformsTo array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeConformsTo:0 string public.data" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification dict" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification:public.filename-extension array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification:public.filename-extension:0 string afs" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification:public.mime-type array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UTExportedTypeDeclarations:0:UTTypeTagSpecification:public.mime-type:0 string application/x-aspisfile" "$PLIST"
          # Point the existing CFBundleDocumentTypes entry at the new UTI
          # so Launch Services treats us as the type Owner, not just a
          # filename-extension handler.
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSItemContentTypes array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleDocumentTypes:0:LSItemContentTypes:0 string com.aspisfile.viewer.document" "$PLIST"
          echo "--- post-patch UTExportedTypeDeclarations ---"
          /usr/libexec/PlistBuddy -c "Print :UTExportedTypeDeclarations" "$PLIST"

          # 2. Re-sign nested code first (frameworks, dylibs, helpers).
          # Order matters because codesign of the outer bundle hashes
          # the inner items — they need to be re-signed first if any
          # exist.
          find "$APP_PATH" \( -name "*.dylib" -o -name "*.framework" -o -name "*Helper*.app" \) -print0 2>/dev/null | \
            while IFS= read -r -d '' x; do
              echo "Re-sign nested: $x"
              codesign --force --sign "$APPLE_SIGNING_IDENTITY" --options runtime --timestamp "$x" || true
            done

          # 3. Re-sign the outer .app with our entitlements + hardened
          # runtime + secure timestamp. --force replaces the Tauri
          # signature; --options runtime keeps the hardened runtime
          # flag (required for notarisation).
          codesign --force \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --options runtime \
            --timestamp \
            --entitlements src-tauri/AspisFile.entitlements \
            "$APP_PATH"

          # 4. Verify signature + entitlements stuck.
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "--- entitlements as embedded ---"
          codesign -d --entitlements - "$APP_PATH" 2>&1 | head -30

      # Notarise + staple the freshly re-signed .app. Submitting the
      # zipped .app to Apple's notary service; on success, staple the
      # ticket so Gatekeeper validates the .app offline once it's
      # extracted from the .pkg into /Applications.
      - name: Notarise + staple the .app
        if: ${{ env.APPLE_ID_PRESENT == 'true' }}
        env:
          APPLE_ID_PRESENT: ${{ secrets.APPLE_ID != '' }}
          APPLE_ID:       ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:  ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH=$(ls -d src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app | head -1)
          ZIP_PATH="$RUNNER_TEMP/app-for-notarisation.zip"

          # notarytool requires a flat archive — ditto preserves
          # symlinks + xattrs (critical for the embedded.provisionprofile
          # and the hardened runtime flags).
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the ticket onto the .app directly so an offline
          # Gatekeeper check passes after install.
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      # pkgbuild needs the Developer ID Installer cert in a keychain it can
      # read. Tauri's build step tore down its own temp keychain, so we
      # create a fresh one and import the Installer .p12 here.
      #
      # Note: this is a *different* certificate from APPLE_CERTIFICATE
      # (which is the Developer ID Application cert used to sign the .app).
      # Apple issues two separate cert types from the same Developer account.
      - name: Import Installer cert for PKG signing
        env:
          APPLE_INSTALLER_CERTIFICATE:          ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_INSTALLER_CERTIFICATE" | base64 --decode > /tmp/installer-cert.p12
          KEYCHAIN="$RUNNER_TEMP/pkg-signing.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security import /tmp/installer-cert.p12 -k "$KEYCHAIN" -P "$APPLE_INSTALLER_CERTIFICATE_PASSWORD" \
                  -T /usr/bin/pkgbuild -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain
          rm /tmp/installer-cert.p12

      # Build the .pkg. pkgbuild signs inline with --sign — no separate
      # codesign step needed for the container (unlike the previous .dmg
      # flow). Install location is hardcoded to /Applications so the
      # recipient doesn't see a "choose destination" page in Installer.app.
      #
      # Package identifier is intentionally distinct from the .app bundle
      # id (com.aspisfile.viewer) — the .pkg id (.viewer.pkg) tracks the
      # installer payload, the bundle id tracks the app. Standard Apple
      # convention.
      - name: Build and sign .pkg installer
        env:
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
        run: |
          APP_PATH=$(ls -d src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app | head -1)
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "App:     $APP_PATH"
          echo "Version: $VERSION"
          mkdir -p artifacts

          # Stage the .app into a clean root directory so we can use
          # `pkgbuild --root` (required for --analyze) instead of
          # --component (which silently marks the bundle as
          # relocatable and offers no override).
          PKG_ROOT=$(mktemp -d)
          cp -R "$APP_PATH" "$PKG_ROOT/"

          # Disable bundle relocation. By default pkgbuild marks bundles
          # as relocatable, which makes macOS Installer search the disk
          # for any existing copy of bundle id com.aspisfile.viewer and
          # INSTALL ON TOP OF IT instead of at --install-location. That
          # broke v1.7.1 for any user with a stray copy of the app
          # outside /Applications — the installer would silently
          # overwrite the stray copy and /Applications stayed empty.
          # See the May 2026 incident.
          #
          # `--analyze` generates the default component plist; we flip
          # BundleIsRelocatable to false and feed it back via
          # --component-plist. Resulting PackageInfo emits empty
          # <relocate/> instead of <relocate><bundle .../></relocate>,
          # so Installer always honours --install-location.
          pkgbuild --analyze --root "$PKG_ROOT" artifacts/component.plist
          /usr/libexec/PlistBuddy -c "Set :0:BundleIsRelocatable false" artifacts/component.plist
          echo "--- patched component.plist ---"
          cat artifacts/component.plist

          # Postinstall script lives in src-tauri/pkg-scripts/. It moves
          # the .pkg the user double-clicked into ~/.Trash after install
          # completes so they don't have to clean up Downloads manually.
          # The script is included in the signed/notarised payload.
          chmod 755 src-tauri/pkg-scripts/postinstall
          pkgbuild \
            --root "$PKG_ROOT" \
            --component-plist artifacts/component.plist \
            --install-location /Applications \
            --identifier com.aspisfile.viewer.pkg \
            --version "$VERSION" \
            --scripts src-tauri/pkg-scripts \
            --sign "$APPLE_INSTALLER_SIGNING_IDENTITY" \
            artifacts/AspisFile.pkg
          pkgutil --check-signature artifacts/AspisFile.pkg
          ls -la artifacts/

      # Notarise the .pkg. Same notarytool flow we used for the .dmg
      # before — Apple's notary service treats .pkg identically. Stapling
      # embeds the notarisation ticket so Gatekeeper validates the
      # installer offline on the recipient's Mac.
      - name: Notarise the PKG
        if: ${{ env.APPLE_ID_PRESENT == 'true' }}
        env:
          APPLE_ID_PRESENT: ${{ secrets.APPLE_ID != '' }}
          APPLE_ID:       ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:  ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit artifacts/AspisFile.pkg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple artifacts/AspisFile.pkg
          xcrun stapler validate artifacts/AspisFile.pkg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: artifacts/AspisFile.pkg
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        # Unsigned for now — SmartScreen warning appears on first run.
        # Windows code-signing cert will be wired in once provisioned.
        run: npm run tauri build

      # Two Windows installers, for two different audiences:
      #
      #   AspisFile-Setup.exe (NSIS, per-user)  → the DEFAULT for recipients.
      #     Installs to %LOCALAPPDATA%, so NO admin rights and NO UAC prompt.
      #     An external counterparty who just needs to read one document can't
      #     run a procurement cycle first.
      #
      #   AspisFile.msi (WiX, per-machine)      → for IT departments.
      #     Tauri's WiX template is InstallScope="perMachine" into Program
      #     Files, so it requires elevation — which is correct for central
      #     deployment via Intune/SCCM/GPO, and is what a managed environment
      #     wants. Keep BOTH: some enterprises explicitly block execution from
      #     %LOCALAPPDATA%, so the per-user build is not a superset.
      #
      # `bundle.targets: "all"` already produced both; CI was discarding the
      # NSIS output.
      - name: Collect installers under stable names
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $msi = Get-ChildItem -Path src-tauri\target\release\bundle\msi\*.msi | Select-Object -First 1
          if (-not $msi) { throw "MSI not found" }
          Copy-Item $msi.FullName -Destination artifacts\AspisFile.msi
          $exe = Get-ChildItem -Path src-tauri\target\release\bundle\nsis\*.exe | Select-Object -First 1
          if (-not $exe) { throw "NSIS installer not found" }
          Copy-Item $exe.FullName -Destination artifacts\AspisFile-Setup.exe
          # Portable: the raw binary, before any bundling. Runs straight from
          # Downloads — no installer, no admin, nothing written outside the
          # user's profile. Last-resort path for locked-down machines where
          # even the per-user installer is blocked. The app calls
          # register_all() on first run to claim aspisfile:// under HKCU, so
          # the browser handoff still works. Requires the WebView2 runtime
          # (present by default on Win 11 and current Win 10).
          $portable = Get-ChildItem -Path src-tauri\target\release\*.exe |
            Where-Object { $_.Name -notlike '*setup*' -and $_.Name -notlike '*Setup*' } |
            Select-Object -First 1
          if (-not $portable) { throw "Portable exe not found" }
          Copy-Item $portable.FullName -Destination artifacts\AspisFile-Portable.exe
          Get-ChildItem artifacts

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            artifacts/AspisFile.msi
            artifacts/AspisFile-Setup.exe
            artifacts/AspisFile-Portable.exe
          retention-days: 1

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-pkg
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: AspisFile ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## AspisFile Desktop ${{ github.event.inputs.tag || github.ref_name }}

            ### Download
            - **macOS** — `AspisFile.pkg` (universal: Apple Silicon + Intel)
            - **Windows** — `AspisFile-Setup.exe` (recommended — no admin rights needed)
            - **Windows (IT-managed)** — `AspisFile.msi` (per-machine, for Intune/SCCM/GPO deployment)
            - **Windows (no install)** — `AspisFile-Portable.exe` (runs from Downloads; for locked-down machines)

            ### Requirements
            - macOS 12 or later
            - Windows 10 or later

            ### Installation
            **macOS**: Double-click the .pkg and follow the installer prompts. The app installs to /Applications automatically.
            **Windows**: Run `AspisFile-Setup.exe` — it installs for your user account only and needs no administrator rights. If SmartScreen appears, click "More info → Run anyway".
            **Windows, deployed by IT**: use `AspisFile.msi` (installs to Program Files for all users; requires elevation).
            **Windows, can't install anything**: `AspisFile-Portable.exe` runs directly from your Downloads folder — no installer and nothing written outside your user profile. Needs the Microsoft WebView2 runtime, which is present by default on Windows 11 and current Windows 10.
          files: |
            artifacts/macos/AspisFile.pkg
            artifacts/windows/AspisFile.msi
            artifacts/windows/AspisFile-Setup.exe
            artifacts/windows/AspisFile-Portable.exe
          draft: false
          prerelease: false
